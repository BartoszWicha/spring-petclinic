version: '3.8'
services:
  petclinic:
    image: bartoszwicha/spring-petclinic:latest
    ports:
      - "8080:8080"
    container_name: petclinic

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    container_name: grafana