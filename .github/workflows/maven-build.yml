name: Java CI with Maven and SonarCloud
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven
      - name: Build with Maven
        run: ./mvnw -B verify
  
      - name: SonarCloud Analysis
        run: ./mvnw sonar:sonar -Dsonar.projectKey=BartoszWicha_spring-petclinic -Dsonar.organization=bartoszwicha -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop $(docker ps -q) || true
            docker rm $(docker ps -aq) || true
            docker pull bartoszwicha/spring-petclinic:latest
            docker run -d --name petclinic -p 8080:8080 bartoszwicha/spring-petclinic:latest

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Build failed! Rolling back..."
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git reset --hard HEAD~1
          git push --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}